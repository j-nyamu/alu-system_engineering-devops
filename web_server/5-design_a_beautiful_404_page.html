<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Lost</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: radial-gradient(circle at 30% 20%, #1e1b4b, #0f172a 70%);
      color: #e2e8f0;
      text-align: center;
      overflow: hidden;
    }
    .wrap { position: relative; z-index: 2; padding: 2rem; }
    .code {
      font-size: clamp(6rem, 22vw, 14rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(90deg, #818cf8, #f472b6, #facc15);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.05em;
    }
    .msg { font-size: 1.5rem; font-weight: 600; margin-top: 0.5rem; }
    .sub { color: #94a3b8; margin-top: 0.75rem; font-size: 1rem; }
    a {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 1.75rem;
      border: 1px solid #818cf8;
      border-radius: 999px;
      color: #c7d2fe;
      text-decoration: none;
      transition: all 0.25s ease;
    }
    a:hover { background: #818cf8; color: #0f172a; }
    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.6;
      animation: twinkle 3s infinite;
    }
    @keyframes twinkle { 0%,100% { opacity: 0.2; } 50% { opacity: 0.9; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <div class="msg">Ceci n'est pas une page</div>
    <p class="sub">The page you're looking for drifted off into space.</p>
    <a href="/">Take me home</a>
  </div>
  <script>
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.top = Math.random() * 100 + 'vh';
      s.style.left = Math.random() * 100 + 'vw';
      s.style.animationDelay = Math.random() * 3 + 's';
      document.body.appendChild(s);
    }
  </script>
</body>
</html>
